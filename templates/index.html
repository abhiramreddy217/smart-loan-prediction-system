<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Smart Loan Prediction System</title>

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS FILE -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- MAIN CONTAINER -->

    <div class="main-container">

        <!-- LEFT SIDE -->

        <div class="left-section">

            <div class="overlay"></div>

            <div class="content">

                <h1>🏦 Smart Loan Prediction</h1>

                <p>
                    Predict loan approval instantly using
                    Artificial Intelligence and Machine Learning.
                </p>

                <div class="features">

                    <div class="feature-box">
                        ✅ Fast Loan Analysis
                    </div>

                    <div class="feature-box">
                        📊 AI-Based Prediction
                    </div>

                    <div class="feature-box">
                        🔒 Secure & Reliable
                    </div>

                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="right-section">

            <div class="form-container">

                <h2>Loan Eligibility Check</h2>

                <form action="/predict" method="post">

                    <!-- INCOME -->

                    <div class="input-box">

                        <label>Applicant Income</label>

                        <input type="number"
                               name="income"
                               placeholder="Enter Applicant Income"
                               required>

                    </div>

                    <!-- LOAN -->

                    <div class="input-box">

                        <label>Loan Amount</label>

                        <input type="number"
                               name="loan"
                               placeholder="Enter Loan Amount"
                               required>

                    </div>

                    <!-- CREDIT -->

                    <div class="input-box">

                        <label>Credit Score</label>

                        <input type="number"
                               name="credit"
                               placeholder="Enter Credit Score"
                               required>

                    </div>

                    <!-- EMI -->

                    <div class="input-box">

                        <label>EMI</label>

                        <input type="number"
                               name="emi"
                               placeholder="Enter EMI"
                               required>

                    </div>

                    <!-- BUTTON -->

                    <button type="submit">

                        Predict Loan Status

                    </button>

                </form>

                <!-- RESULT -->

                {% if prediction %}

                    <div class="result">

                        {{ prediction }}

                    </div>

                {% endif %}

                <!-- FOOTER -->

                <div class="footer">

                    Developed using Flask, Python & Machine Learning

                </div>

            </div>

        </div>

    </div>

</body>

</html>
